name: pr-sop
description: Opinionated PR governance checks. Config-driven, no LLM.
author: Pawan Singh Kapkoti
branding:
  icon: check-circle
  color: purple

inputs:
  config:
    description: Path to .prsop.yml relative to the repo root.
    required: false
    default: .prsop.yml
  base:
    description: Base ref to diff against. Defaults to the PR base or origin/main.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install pr-sop
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install pr-sop

    - name: Determine base ref
      id: base
      shell: bash
      run: |
        if [ -n "${{ inputs.base }}" ]; then
          echo "ref=${{ inputs.base }}" >> "$GITHUB_OUTPUT"
        elif [ -n "${{ github.base_ref }}" ]; then
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" || true
          echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
        else
          git fetch --no-tags --depth=1 origin main || true
          echo "ref=origin/main" >> "$GITHUB_OUTPUT"
        fi

    - name: Run pr-sop
      shell: bash
      run: |
        pr-sop check --repo . --config "${{ inputs.config }}" --base "${{ steps.base.outputs.ref }}"
